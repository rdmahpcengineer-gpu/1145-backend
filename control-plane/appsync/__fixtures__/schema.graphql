# =============================================================================
# TEST FIXTURE — NOT THE SOURCE OF TRUTH.
#
# This file is a *stand-in* for the imported CP-3 SDL that the real backend
# loads from `@alchemist/contracts` `graphql/schema.graphql` (see design.md
# "CP-3" and steering `tech-and-structure.md`: "the CP-3 AppSync schema is the
# SDL from @alchemist/contracts — load it, don't rewrite it").
#
# It exists ONLY so that `cdk synth` and the synth/snapshot tests can run when
# the `@alchemist/contracts` package is not installed/linked in this checkout.
# The `LiveStateApi` construct falls back to this fixture and emits a loud
# warning whenever it is used. In every real deployment the loader resolves the
# imported contract artifact instead (via node resolution or
# `ALCHEMIST_CONTRACTS_DIR`), and this fixture is never read.
#
# It is intentionally a representative subset — enough to exercise the two CP-3
# auth modes and the publish/subscribe fan-out shape — and must never be
# treated as the authoritative contract. Do NOT extend this to "fill in" the
# real schema; author the contract in `@alchemist/contracts`.
#
# Representative types: Call (with `sentiment` + `transcript`), Lead, the
# `publish*` mutations (@aws_iam) and matching subscriptions/queries
# (@aws_cognito_user_pools).
# =============================================================================

# A live call surfaced on the operator dashboard. Readable by operators
# (Cognito) and writable only by the backend fan-out mutations (IAM), so the
# type is reachable under both auth modes.
type Call @aws_cognito_user_pools @aws_iam {
  id: ID!
  tenantId: ID!
  status: String!
  sentiment: Float
  transcript: [TranscriptSegment!]
  escalated: Boolean
  startedAt: AWSDateTime
}

type TranscriptSegment @aws_cognito_user_pools @aws_iam {
  callId: ID!
  speaker: String!
  text: String!
  at: AWSDateTime
}

type Lead @aws_cognito_user_pools @aws_iam {
  id: ID!
  tenantId: ID!
  name: String
  phone: String
  email: String
  notes: String
}

# Reads/subscriptions are authorized with Cognito user pools (CP-1).
type Query {
  getCall(id: ID!): Call @aws_cognito_user_pools
  listCalls(tenant: ID): [Call!]! @aws_cognito_user_pools
}

# `publish*` fan-out mutations are authorized with IAM only — invoked by the
# backend with the tenant set from the validated SE-1 session.
type Mutation {
  publishCallUpdate(call: CallInput!): Call @aws_iam
  appendTranscript(segment: TranscriptInput!): TranscriptSegment @aws_iam
  publishLead(lead: LeadInput!): Lead @aws_iam
  publishCallEscalated(call: CallInput!): Call @aws_iam
}

# Subscriptions deliver the fan-out to authorized operators (Cognito). Any
# `tenant` argument is a filter, never an authorization boundary.
type Subscription {
  onCallUpdate(tenant: ID): Call
    @aws_subscribe(mutations: ["publishCallUpdate", "publishCallEscalated"])
    @aws_cognito_user_pools
  onTranscript(callId: ID!): TranscriptSegment
    @aws_subscribe(mutations: ["appendTranscript"])
    @aws_cognito_user_pools
  onLead(tenant: ID): Lead
    @aws_subscribe(mutations: ["publishLead"])
    @aws_cognito_user_pools
}

input CallInput {
  id: ID!
  tenantId: ID
  status: String
  sentiment: Float
}

input TranscriptInput {
  callId: ID!
  speaker: String!
  text: String!
}

input LeadInput {
  tenantId: ID
  name: String
  phone: String
  email: String
  notes: String
}

schema {
  query: Query
  mutation: Mutation
  subscription: Subscription
}
